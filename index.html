<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO · PDEF → RAW Calculator</title>
    <style>
        /* ----- RO THEME - White, Black, #922432, #FFF400 ----- */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            background-image:
                /* Diagonal stripe pattern */
                repeating-linear-gradient(45deg,
                    rgba(146, 36, 50, 0.04) 0px,
                    rgba(146, 36, 50, 0.04) 2px,
                    transparent 2px,
                    transparent 8px),
                repeating-linear-gradient(-45deg,
                    rgba(146, 36, 50, 0.04) 0px,
                    rgba(146, 36, 50, 0.04) 2px,
                    transparent 2px,
                    transparent 8px),
                /* Crosshatch overlay */
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.02) 0px,
                    rgba(0, 0, 0, 0.02) 1px,
                    transparent 1px,
                    transparent 12px),
                repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.02) 0px,
                    rgba(0, 0, 0, 0.02) 1px,
                    transparent 1px,
                    transparent 12px);
            background-size: 100%, 100%, 100%, 100%;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            font-family: 'Roboto Slab', serif;
            position: relative;
        }

        /* subtle border pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                /* Tiny dot pattern */
                radial-gradient(circle at 20% 50%, rgba(146, 36, 50, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 30%, rgba(146, 36, 50, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 80%, rgba(146, 36, 50, 0.03) 1px, transparent 1px);
            background-size: 60px 60px, 80px 80px, 100px 100px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            max-width: 540px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px 28px 24px 24px;
            padding: 2rem 2rem 2.2rem;
            box-shadow:
                0 0 0 2px #922432,
                0 0 0 5px rgba(146, 36, 50, 0.12),
                0 12px 40px rgba(0, 0, 0, 0.12),
                inset 0 0 30px rgba(146, 36, 50, 0.02);
            border: 1px solid rgba(146, 36, 50, 0.15);
            position: relative;
            z-index: 1;
            transition: 0.2s;
        }

        /* corner decorations - shield icons */
        .card::before {
            content: '🛡';
            position: absolute;
            top: -8px;
            left: 14px;
            font-size: 1.6rem;
            color: #922432;
            text-shadow: 0 2px 6px rgba(146, 36, 50, 0.2);
            transform: rotate(-12deg);
            opacity: 0.7;
        }
        .card::after {
            content: '🛡';
            position: absolute;
            bottom: -6px;
            right: 14px;
            font-size: 1.6rem;
            color: #922432;
            text-shadow: 0 2px 6px rgba(146, 36, 50, 0.2);
            transform: rotate(12deg);
            opacity: 0.7;
        }

        /* header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #922432;
            padding-bottom: 0.5rem;
            margin-bottom: 1.4rem;
            flex-wrap: wrap;
        }

        h1 {
            font-family: 'Roboto Slab', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        h1 small {
            font-size: 0.75rem;
            font-family: 'Roboto Slab', serif;
            font-weight: 600;
            color: #ffffff;
            background: #922432;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #922432;
            letter-spacing: 0.03em;
        }

        .subhead {
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            background: #922432;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            border: 1px solid #922432;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1);
            letter-spacing: 0.04em;
            font-family: 'Roboto Slab', serif;
        }

        /* input groups */
        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #000000;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
            padding: 0 0.3rem;
            font-family: 'Roboto Slab', serif;
        }
        label .hint {
            font-weight: 400;
            color: #922432;
            font-size: 0.7rem;
            background: rgba(146, 36, 50, 0.08);
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            border: 1px solid rgba(146, 36, 50, 0.2);
            font-family: 'Roboto Slab', serif;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 30px;
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
            border: 2px solid #922432;
            box-shadow:
                inset 0 2px 8px rgba(0, 0, 0, 0.05),
                0 2px 6px rgba(0, 0, 0, 0.03);
            transition: 0.15s;
        }
        .input-wrapper:focus-within {
            border-color: #922432;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05), 0 0 0 3px rgba(146, 36, 50, 0.15);
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            padding: 0.75rem 0.3rem 0.75rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000000;
            width: 100%;
            outline: none;
            font-family: 'Roboto Slab', serif;
        }
        .input-wrapper input::placeholder {
            color: #999999;
            font-weight: 400;
            font-size: 0.9rem;
            font-family: 'Roboto Slab', serif;
        }
        /* remove number arrows */
        .input-wrapper input[type=number]::-webkit-inner-spin-button,
        .input-wrapper input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-wrapper input[type=number] {
            -moz-appearance: textfield;
        }

        .input-wrapper .suffix {
            background: #922432;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 700;
            color: #ffffff;
            font-size: 0.8rem;
            border-left: 2px solid #922432;
            letter-spacing: 0.05em;
            font-family: 'Roboto Slab', serif;
        }

        /* buttons */
        .action-row {
            display: flex;
            gap: 0.7rem;
            margin: 1.5rem 0 1.2rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 110px;
            background: #ffffff;
            border: 2px solid #922432;
            padding: 0.7rem 0.4rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #000000;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 4px 0 #922432, 0 6px 12px rgba(0, 0, 0, 0.08);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Roboto Slab', serif;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background-image: linear-gradient(180deg, #ffffff 0%, #f5f0eb 100%);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #922432, 0 6px 12px rgba(0, 0, 0, 0.08);
        }

        .btn-primary {
            background: #922432;
            background-image: linear-gradient(180deg, #b02a3e 0%, #7a1d2a 100%);
            color: #ffffff;
            border-color: #922432;
            box-shadow: 0 4px 0 #6a1924, 0 6px 12px rgba(0, 0, 0, 0.15);
            font-family: 'Roboto Slab', serif;
        }
        .btn-primary:hover {
            background-image: linear-gradient(180deg, #c02e44 0%, #922432 100%);
        }
        .btn-secondary {
            background: #ffffff;
            background-image: linear-gradient(180deg, #ffffff 0%, #f0ece6 100%);
            font-family: 'Roboto Slab', serif;
        }
        .btn-secondary:hover {
            background-image: linear-gradient(180deg, #ffffff 0%, #e8e0d8 100%);
        }

        /* result box */
        .result-box {
            background: #f5f0eb;
            background-image: linear-gradient(145deg, #ffffff, #f0ece6);
            border-radius: 30px;
            padding: 1.1rem 1.6rem;
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #922432;
            box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .result-box .label {
            font-weight: 700;
            color: #000000;
            font-size: 1rem;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Roboto Slab', serif;
        }
        .result-box .value {
            font-size: 2.1rem;
            font-weight: 700;
            color: #000000;
            background: #ffffff;
            padding: 0.1rem 1.2rem;
            border-radius: 40px;
            border: 2px solid #922432;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.05);
            font-family: 'Roboto Slab', serif;
            letter-spacing: 0.01em;
            word-break: break-all;
            text-align: right;
            min-width: 80px;
        }
        .result-box .value.warning {
            color: #922432;
            background: #ffffff;
            border-color: #922432;
        }
        .result-box .value.empty {
            color: #999999;
            font-weight: 400;
        }

        /* footnote */
        .footnote {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #000000;
            text-align: center;
            border-top: 2px dashed #922432;
            padding-top: 0.8rem;
            font-weight: 500;
            background: rgba(146, 36, 50, 0.04);
            border-radius: 20px;
            padding: 0.6rem 0.8rem;
            font-family: 'Roboto Slab', serif;
        }
        .footnote kbd {
            background: #922432;
            color: #ffffff;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid #922432;
            font-family: 'Roboto Slab', serif;
        }
        .footnote span {
            background: #ffffff;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            border: 1px solid rgba(146, 36, 50, 0.2);
            font-family: 'Roboto Slab', serif;
        }

        /* ----- CREDITS - BOTTOM RIGHT OF PAGE ----- */
        .page-credits {
            position: fixed;
            bottom: 14px;
            right: 18px;
            font-size: 0.75rem;
            color: #000000;
            text-align: right;
            padding: 0.35rem 1rem;
            border: 1px solid #922432;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08), inset 0 1px 4px rgba(255, 255, 255, 0.5);
            letter-spacing: 0.03em;
            font-family: 'Roboto Slab', serif;
            z-index: 100;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        .page-credits .guild-name {
            color: #922432;
            font-weight: 700;
        }
        .page-credits .maker-name {
            color: #000000;
            font-weight: 600;
        }
        .page-credits .sep {
            color: #999999;
            margin: 0 0.25rem;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.5rem;
            }
            .result-box .value {
                font-size: 1.6rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .page-credits {
                font-size: 0.65rem;
                padding: 0.25rem 0.8rem;
                bottom: 10px;
                right: 12px;
                white-space: nowrap;
            }
        }

        @media (max-width: 380px) {
            .page-credits {
                font-size: 0.55rem;
                padding: 0.2rem 0.6rem;
                bottom: 8px;
                right: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- MAIN CALCULATOR CARD -->
    <div class="card">
        <div class="header">
            <h1>
                <span>🛡</span> PDEF <small>→ RAW</small>
            </h1>
            <div class="subhead">🛡️ <span style="margin-left:6px;">(1 + rate)</span></div>
        </div>

        <!-- PDEF input -->
        <div class="input-group">
            <label>
                <span>📊 PDEF value</span>
                <span class="hint">input</span>
            </label>
            <div class="input-wrapper">
                <input type="number" id="pdefInput" step="any" placeholder="e.g. 3010">
                <span class="suffix">PDEF</span>
            </div>
        </div>

        <!-- Percentage input -->
        <div class="input-group">
            <label>
                <span>📈 Equipment PDEF Percentage rate</span>
                <span class="hint">%</span>
            </label>
            <div class="input-wrapper">
                <input type="number" id="percentInput" step="any" placeholder="e.g. 23.80">
                <span class="suffix">%</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="action-row">
            <button class="btn btn-primary" id="calcBtn">⚡ Calculate</button>
            <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
        </div>

        <!-- Result -->
        <div class="result-box" id="resultBox">
            <span class="label">🧮 RAW PDEF</span>
            <span class="value empty" id="resultValue">—</span>
        </div>

        <!-- Footnote -->
        <div class="footnote">
            <kbd>formula</kbd>
            <span id="formulaPreview">enter values to calculate</span>
        </div>
    </div>

    <!-- CREDITS - BOTTOM RIGHT OF PAGE -->
    <div class="page-credits">
        <span class="guild-name">Finest Guild</span>
        <span class="sep">·</span>
        <span class="maker-name">kGod</span>
    </div>

    <script>
        (function() {
            const pdefInput = document.getElementById('pdefInput');
            const percentInput = document.getElementById('percentInput');
            const resultValue = document.getElementById('resultValue');
            const formulaPreview = document.getElementById('formulaPreview');

            const calcBtn = document.getElementById('calcBtn');
            const resetBtn = document.getElementById('resetBtn');

            function computeRaw(pdef, percent) {
                if (pdef === undefined || percent === undefined) return null;
                const pdefNum = parseFloat(pdef);
                const percentNum = parseFloat(percent);
                if (isNaN(pdefNum) || isNaN(percentNum)) return null;
                if (pdefNum === 0) return 0;
                const divisor = 1 + (percentNum / 100);
                if (divisor === 0) return null;
                return pdefNum / divisor;
            }

            function formatNumber(num) {
                if (num === null || num === undefined || !isFinite(num)) return '—';
                const rounded = Math.round(num * 100) / 100;
                if (rounded === 0) return '0.00';
                return rounded.toFixed(2);
            }

            function updateResult() {
                const pdefRaw = pdefInput.value.trim();
                const percentRaw = percentInput.value.trim();

                const pdef = parseFloat(pdefRaw);
                const percent = parseFloat(percentRaw);

                let raw = null;
                let displayRaw = '—';
                let previewText = '';

                if (!isNaN(pdef) && !isNaN(percent)) {
                    raw = computeRaw(pdef, percent);
                    if (raw !== null && isFinite(raw)) {
                        displayRaw = formatNumber(raw);
                        const divisor = (1 + (percent / 100));
                        const divisorFormatted = formatNumber(divisor);
                        previewText = `${pdef} ÷ ${divisorFormatted} = ${displayRaw}`;
                    } else {
                        displayRaw = 'error';
                        previewText = '⚠️ invalid divisor';
                    }
                } else {
                    const pdefValid = !isNaN(parseFloat(pdefRaw)) && pdefRaw !== '';
                    const percentValid = !isNaN(parseFloat(percentRaw)) && percentRaw !== '';
                    if (!pdefValid && !percentValid) {
                        previewText = 'enter PDEF and %';
                    } else if (!pdefValid) {
                        previewText = 'enter a valid PDEF';
                    } else if (!percentValid) {
                        previewText = 'enter a valid percentage';
                    } else {
                        previewText = 'check input values';
                    }
                    displayRaw = '—';
                }

                resultValue.textContent = displayRaw;
                formulaPreview.textContent = previewText;

                if (displayRaw === '—' || displayRaw === 'error' || displayRaw === 'NaN') {
                    resultValue.classList.add('warning');
                    resultValue.classList.add('empty');
                } else {
                    resultValue.classList.remove('warning');
                    resultValue.classList.remove('empty');
                }
            }

            function resetToDefault() {
                pdefInput.value = '';
                percentInput.value = '';
                resultValue.textContent = '—';
                resultValue.classList.add('warning');
                resultValue.classList.add('empty');
                formulaPreview.textContent = 'enter values to calculate';
            }

            calcBtn.addEventListener('click', updateResult);
            resetBtn.addEventListener('click', resetToDefault);

            pdefInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault();
                    updateResult(); }
            });
            percentInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault();
                    updateResult(); }
            });

            pdefInput.addEventListener('blur', updateResult);
            percentInput.addEventListener('blur', updateResult);

            pdefInput.addEventListener('input', function() {
                if (this.value === '' && percentInput.value === '') {
                    formulaPreview.textContent = 'enter PDEF and %';
                    resultValue.textContent = '—';
                    resultValue.classList.add('warning');
                    resultValue.classList.add('empty');
                } else if (this.value === '') {
                    formulaPreview.textContent = 'enter a valid PDEF';
                    resultValue.textContent = '—';
                    resultValue.classList.add('warning');
                    resultValue.classList.add('empty');
                }
            });
            percentInput.addEventListener('input', function() {
                if (this.value === '' && pdefInput.value === '') {
                    formulaPreview.textContent = 'enter PDEF and %';
                    resultValue.textContent = '—';
                    resultValue.classList.add('warning');
                    resultValue.classList.add('empty');
                } else if (this.value === '') {
                    formulaPreview.textContent = 'enter a valid percentage';
                    resultValue.textContent = '—';
                    resultValue.classList.add('warning');
                    resultValue.classList.add('empty');
                }
            });

            window.addEventListener('load', () => {
                pdefInput.value = '';
                percentInput.value = '';
                resultValue.textContent = '—';
                resultValue.classList.add('warning');
                resultValue.classList.add('empty');
                formulaPreview.textContent = 'enter values to calculate';
            });
        })();
    </script>

</body>
